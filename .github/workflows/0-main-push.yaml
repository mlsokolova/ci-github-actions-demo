# 1. WORKFLOW IDENTITY
name: push into the main CI-CD Pipeline
run-name: Checkout and print the message. Triggered by ${{ github.actor }}

# 2. TRIGGER EVENTS
on:
  push:
    branches: [ "main" ]

# 4. JOBS AND STEPS
jobs:
  checkout-and-print:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: get env variables
        run: env

      - name: Print the message
        run: echo "Hello, CI with GitHub Actions!"

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s .
