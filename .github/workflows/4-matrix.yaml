# 1. WORKFLOW IDENTITY
name: Run tests
run-name: Run tests. Triggered by ${{ github.actor }}

# 2. TRIGGER EVENTS
on:
  push:
    branches: [ "main" ]

# 4. JOBS AND STEPS
jobs:
  run-matrix-tests:
    runs-on: ubuntu-latest
    strategy: 
      matrix:
        python-version: [3.7, 3.8, 3.9]
      fail-fast: false
    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s .
