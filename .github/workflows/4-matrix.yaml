# 1. WORKFLOW IDENTITY
name: Run matrix tests
run-name: Run matrix tests. Triggered by ${{ github.actor }}

# 2. TRIGGER EVENTS
on:
  push:
    branches: [ "main" ]

# 4. JOBS AND STEPS
jobs:
  run-matrix-tests:
    runs-on: ubuntu-22.04
    strategy: 
      matrix:
        python-version: [3.7, 3.8, 3.9] # 3.7 does not exists for ubuntu latest v.24.04
      fail-fast: false # to prevent the workflow from stopping after the first failure in the matrix
    name: Run tests on Python v.${{ matrix.python-version }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s .
